<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="description" content="老板不在 - 职场生存模拟器，996社畜的爆笑日常">
<title>老板不在 · 职场生存模拟器</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --bg: #1a1a2e;
    --bg-light: #252542;
    --card: #2d2d4a;
    --text: #e8e8f0;
    --text-dim: #8888aa;
    --accent: #ff6b9d;
    --accent-2: #c44dff;
    --energy: #ffd93d;
    --mood: #6bcb77;
    --hair: #ff9a76;
    --danger: #ff4757;
    --btn: #4a4a6a;
    --btn-hover: #5a5a7a;
  }
  
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, var(--bg) 0%, #16213e 100%);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  
  /* 像素风格字体效果 */
  .pixel-text {
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
  }
  
  /* 开始界面 */
  .start-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    position: relative;
    overflow: hidden;
  }
  
  .start-screen::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(255,107,157,0.1) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(196,77,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }
  
  .game-title {
    font-size: 42px;
    font-weight: bold;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
    text-align: center;
    letter-spacing: 2px;
  }
  
  .game-subtitle {
    font-size: 16px;
    color: var(--text-dim);
    margin-bottom: 30px;
    letter-spacing: 4px;
  }
  
  .title-decoration {
    font-size: 48px;
    margin-bottom: 20px;
    animation: bounce 2s ease-in-out infinite;
  }
  
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  
  .start-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
  }
  
  .stat-preview {
    text-align: center;
    padding: 15px;
    background: var(--card);
    border-radius: 12px;
    min-width: 70px;
  }
  
  .stat-preview .icon {
    font-size: 24px;
    margin-bottom: 5px;
  }
  
  .stat-preview .label {
    font-size: 11px;
    color: var(--text-dim);
  }
  
  .start-btn {
    padding: 16px 60px;
    font-size: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,157,0.4);
    transition: all 0.3s;
    font-weight: bold;
    letter-spacing: 2px;
  }
  
  .start-btn:active {
    transform: scale(0.95);
    box-shadow: 0 2px 10px rgba(255,107,157,0.3);
  }
  
  .sound-toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    cursor: pointer;
    z-index: 100;
    transition: all 0.2s;
  }
  
  .sound-toggle:active {
    transform: scale(0.9);
  }
  
  .tip-text {
    margin-top: 30px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    max-width: 280px;
    line-height: 1.6;
  }
  
  /* 游戏主界面 */
  .game-screen {
    min-height: 100vh;
    padding: 20px 15px 100px;
    display: none;
    flex-direction: column;
  }
  
  .game-screen.show {
    display: flex;
  }
  
  /* 顶部状态栏 */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
  }
  
  .day-indicator {
    font-size: 14px;
    color: var(--text-dim);
  }
  
  .day-indicator .day {
    font-size: 20px;
    color: var(--accent);
    font-weight: bold;
  }
  
  .time-display {
    font-size: 16px;
    color: var(--text);
    font-family: monospace;
  }
  
  /* 属性条 */
  .stats-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    background: var(--card);
    padding: 12px;
    border-radius: 12px;
  }
  
  .stat-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  
  .stat-icon {
    font-size: 18px;
  }
  
  .stat-bar-container {
    width: 100%;
    height: 8px;
    background: var(--bg-light);
    border-radius: 4px;
    overflow: hidden;
  }
  
  .stat-bar {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease, background 0.3s;
  }
  
  .stat-bar.energy { background: var(--energy); }
  .stat-bar.mood { background: var(--mood); }
  .stat-bar.hair { background: var(--hair); }
  
  .stat-bar.low {
    animation: pulse-danger 1s ease-in-out infinite;
  }
  
  @keyframes pulse-danger {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  
  .stat-value {
    font-size: 12px;
    color: var(--text-dim);
  }
  
  /* 场景区域 */
  .scene-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
  }
  
  .event-card {
    background: var(--card);
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    animation: slideIn 0.5s ease;
  }
  
  @keyframes slideIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }
  
  .event-time {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .event-time .time-icon {
    font-size: 14px;
  }
  
  .event-title {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--text);
    line-height: 1.4;
  }
  
  .event-desc {
    font-size: 14px;
    color: #bbb;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  
  .event-illustration {
    font-size: 60px;
    text-align: center;
    margin: 10px 0 20px;
  }
  
  /* 选项按钮 */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  
  .choice-btn {
    width: 100%;
    padding: 14px 16px;
    background: var(--btn);
    color: var(--text);
    border: 2px solid transparent;
    border-radius: 12px;
    font-size: 14px;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  
  .choice-btn:hover {
    background: var(--btn-hover);
  }
  
  .choice-btn:active {
    transform: scale(0.98);
    background: var(--accent-2);
  }
  
  .choice-btn .choice-label {
    font-weight: bold;
    color: var(--accent);
    margin-right: 8px;
  }
  
  .choice-btn.correct {
    background: rgba(107, 203, 119, 0.2);
    border-color: var(--mood);
  }
  
  .choice-btn.wrong {
    background: rgba(255, 71, 87, 0.2);
    border-color: var(--danger);
  }
  
  /* 结果反馈 */
  .result-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: var(--card);
    padding: 25px;
    border-radius: 16px;
    max-width: 320px;
    width: 90%;
    text-align: center;
    z-index: 200;
    animation: popIn 0.3s ease;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    display: none;
  }
  
  .result-popup.show {
    display: block;
  }
  
  @keyframes popIn {
    from {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.8);
    }
    to {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  }
  
  .result-emoji {
    font-size: 50px;
    margin-bottom: 10px;
  }
  
  .result-title {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
    color: var(--accent);
  }
  
  .result-desc {
    font-size: 14px;
    color: #ccc;
    line-height: 1.6;
    margin-bottom: 15px;
  }
  
  .stat-changes {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
  }
  
  .stat-change {
    font-size: 13px;
    padding: 4px 8px;
    border-radius: 6px;
    background: var(--bg-light);
  }
  
  .stat-change.positive { color: var(--mood); }
  .stat-change.negative { color: var(--danger); }
  
  .result-btn {
    padding: 12px 30px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 20px;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .result-btn:active {
    transform: scale(0.95);
  }
  
  .overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 150;
    display: none;
  }
  
  .overlay.show {
    display: block;
  }
  
  /* 结局界面 */
  .ending-screen {
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    text-align: center;
  }
  
  .ending-screen.show {
    display: flex;
  }
  
  .ending-title {
    font-size: 32px;
    font-weight: bold;
    margin-bottom: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  
  .ending-emoji {
    font-size: 80px;
    margin-bottom: 20px;
  }
  
  .ending-desc {
    font-size: 15px;
    color: #ccc;
    line-height: 1.8;
    margin-bottom: 30px;
    max-width: 320px;
  }
  
  .ending-stats {
    display: flex;
    gap: 20px;
    margin-bottom: 30px;
  }
  
  .ending-stat {
    text-align: center;
    padding: 15px 20px;
    background: var(--card);
    border-radius: 12px;
  }
  
  .ending-stat .value {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  
  .ending-stat .label {
    font-size: 11px;
    color: var(--text-dim);
  }
  
  .achievement-list {
    width: 100%;
    max-width: 320px;
    margin-bottom: 30px;
  }
  
  .achievement-title {
    font-size: 14px;
    color: var(--text-dim);
    margin-bottom: 10px;
    text-align: left;
  }
  
  .achievement-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--card);
    border-radius: 10px;
    margin-bottom: 6px;
  }
  
  .achievement-item .icon {
    font-size: 24px;
  }
  
  .achievement-item .info {
    flex: 1;
    text-align: left;
  }
  
  .achievement-item .name {
    font-size: 13px;
    font-weight: bold;
  }
  
  .achievement-item .desc {
    font-size: 11px;
    color: var(--text-dim);
  }
  
  .restart-btn {
    padding: 14px 50px;
    font-size: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    color: #fff;
    border: none;
    border-radius: 25px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(255,107,157,0.4);
    font-weight: bold;
  }
  
  .restart-btn:active {
    transform: scale(0.95);
  }
  
  .share-hint {
    margin-top: 20px;
    font-size: 12px;
    color: var(--text-dim);
  }
  
  /* 消息提示 */
  .notification {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--card);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s, top 0.3s;
    pointer-events: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  
  .notification.show {
    opacity: 1;
    top: 60px;
  }
  
  /* 进度指示器 */
  .week-progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 15px;
  }
  
  .week-day {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: var(--text-dim);
    transition: all 0.3s;
  }
  
  .week-day.current {
    background: var(--accent);
    color: #fff;
    transform: scale(1.2);
  }
  
  .week-day.passed {
    background: var(--mood);
    color: #fff;
    opacity: 0.7;
  }
  
  .week-day.dead {
    background: var(--danger);
    color: #fff;
  }
  
  /* 底部操作栏 */
  .bottom-actions {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 15px 20px;
    background: rgba(26, 26, 46, 0.95);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-around;
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 50;
  }
  
  .action-icon {
    font-size: 24px;
    cursor: pointer;
    transition: transform 0.2s;
  }
  
  .action-icon:active {
    transform: scale(0.9);
  }
  
  /* 成就弹出 */
  .achievement-popup {
    position: fixed;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: linear-gradient(135deg, #ffd93d, #ff9a76);
    color: #333;
    padding: 20px 30px;
    border-radius: 16px;
    z-index: 400;
    text-align: center;
    display: none;
    animation: achievementPop 0.5s ease;
    box-shadow: 0 10px 40px rgba(255,217,61,0.4);
  }
  
  .achievement-popup.show {
    display: block;
  }
  
  @keyframes achievementPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    50% { transform: translate(-50%, -50%) scale(1.1); }
    100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }
  
  .achievement-popup .badge {
    font-size: 50px;
    margin-bottom: 8px;
  }
  
  .achievement-popup .name {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 4px;
  }
  
  .achievement-popup .desc {
    font-size: 13px;
    opacity: 0.8;
  }
  
  /* 响应式 */
  @media (max-width: 360px) {
    .game-title { font-size: 34px; }
    .event-card { padding: 15px; }
    .event-title { font-size: 16px; }
  }
</style>
</head>
<body>

<!-- 音效开关 -->
<div class="sound-toggle" id="soundToggle" onclick="toggleSound()">🔊</div>

<!-- 开始界面 -->
<div class="start-screen" id="startScreen">
  <div class="title-decoration">💼</div>
  <h1 class="game-title pixel-text">老板不在</h1>
  <p class="game-subtitle">职场生存模拟器</p>
  
  <div class="start-stats">
    <div class="stat-preview">
      <div class="icon">⚡</div>
      <div class="label">体力</div>
    </div>
    <div class="stat-preview">
      <div class="icon">😊</div>
      <div class="label">心情</div>
    </div>
    <div class="stat-preview">
      <div class="icon">💇</div>
      <div class="label">发际线</div>
    </div>
  </div>
  
  <button class="start-btn" onclick="startGame()">开始打工</button>
  
  <p class="tip-text">
    从周一熬到周五<br>
    每个选择都影响你的体力、心情和头发<br>
    看看你能活过第几周？
  </p>
</div>

<!-- 游戏主界面 -->
<div class="game-screen" id="gameScreen">
  
  <!-- 周进度 -->
  <div class="week-progress" id="weekProgress">
    <div class="week-day" data-day="1">一</div>
    <div class="week-day" data-day="2">二</div>
    <div class="week-day" data-day="3">三</div>
    <div class="week-day" data-day="4">四</div>
    <div class="week-day" data-day="5">五</div>
  </div>
  
  <!-- 属性 -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-icon">⚡</div>
      <div class="stat-bar-container">
        <div class="stat-bar energy" id="energyBar" style="width: 80%"></div>
      </div>
      <div class="stat-value" id="energyValue">80</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">😊</div>
      <div class="stat-bar-container">
        <div class="stat-bar mood" id="moodBar" style="width: 60%"></div>
      </div>
      <div class="stat-value" id="moodValue">60</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">💇</div>
      <div class="stat-bar-container">
        <div class="stat-bar hair" id="hairBar" style="width: 100%"></div>
      </div>
      <div class="stat-value" id="hairValue">100</div>
    </div>
  </div>
  
  <!-- 场景 -->
  <div class="scene-area">
    <div class="event-card" id="eventCard">
      <div class="event-time">
        <span class="time-icon">🕐</span>
        <span id="eventTime">上午 9:00</span>
      </div>
      <div class="event-illustration" id="eventIllustration">☕</div>
      <h2 class="event-title" id="eventTitle">周一早晨</h2>
      <p class="event-desc" id="eventDesc">
        又到了周一早晨，闹钟响了第三遍了。你的眼皮像灌了铅一样重。
      </p>
      <div class="choices" id="choices">
        <!-- 选项会动态生成 -->
      </div>
    </div>
  </div>
  
  <!-- 底部 -->
  <div class="bottom-actions">
    <div class="action-icon" onclick="showAchievements()">🏆</div>
    <div class="action-icon" onclick="restartGame()">🔄</div>
    <div class="action-icon" onclick="shareGame()">📤</div>
  </div>
</div>

<!-- 结果弹窗 -->
<div class="overlay" id="resultOverlay"></div>
<div class="result-popup" id="resultPopup">
  <div class="result-emoji" id="resultEmoji">😅</div>
  <div class="result-title" id="resultTitle">结果</div>
  <div class="result-desc" id="resultDesc">描述</div>
  <div class="stat-changes" id="statChanges"></div>
  <button class="result-btn" onclick="nextEvent()">继续</button>
</div>

<!-- 成就弹窗 -->
<div class="achievement-popup" id="achievementPopup">
  <div class="badge">🏆</div>
  <div class="name">成就解锁</div>
  <div class="desc">描述</div>
</div>

<!-- 通知 -->
<div class="notification" id="notification">提示消息</div>

<!-- 结局界面 -->
<div class="ending-screen" id="endingScreen">
  <div class="ending-emoji" id="endingEmoji">🎉</div>
  <h2 class="ending-title" id="endingTitle">恭喜通关！</h2>
  <p class="ending-desc" id="endingDesc">
    你成功活过了这一周！虽然掉了点头发，但至少还活着。
  </p>
  
  <div class="ending-stats">
    <div class="ending-stat">
      <div class="value" id="endEnergy">--</div>
      <div class="label">剩余体力</div>
    </div>
    <div class="ending-stat">
      <div class="value" id="endMood">--</div>
      <div class="label">最终心情</div>
    </div>
    <div class="ending-stat">
      <div class="value" id="endHair">--</div>
      <div class="label">剩余头发</div>
    </div>
  </div>
  
  <div class="achievement-list" id="achievementList">
    <!-- 成就列表 -->
  </div>
  
  <button class="restart-btn" onclick="restartGame()">再来一周</button>
  <p class="share-hint">点击右上角分享，看看朋友能活过周几</p>
</div>

<script>
// ==================== 游戏状态 ====================

// ==================== 音效系统 ====================
function initAudio() {
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(e) {
    console.log('Audio not supported');
  }
}

function playTone(freq, duration, type = 'sine', volume = 0.3) {
  if (!soundEnabled || !audioCtx) return;
  
  try {
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    oscillator.frequency.value = freq;
    oscillator.type = type;
    
    gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
    
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + duration);
  } catch(e) {}
}

}

// 背景音乐 - 简单的8-bit循环
let bgmInterval = null;
function startBGM() {
  if (!soundEnabled || !audioCtx) return;
  if (bgmInterval) return;
  
  const melody = [
    { note: 392, dur: 200 }, // G4
    { note: 440, dur: 200 }, // A4
    { note: 494, dur: 200 }, // B4
    { note: 523, dur: 400 }, // C5
    { note: 494, dur: 200 }, // B4
    { note: 523, dur: 600 }, // C5
    { note: 440, dur: 200 }, // A4
    { note: 392, dur: 200 }, // G4
    { note: 440, dur: 200 }, // A4
    { note: 392, dur: 400 }, // G4
    { note: 330, dur: 200 }, // E4
    { note: 392, dur: 600 }, // G4
  ];
  
  let currentNote = 0;
  
  function playNextNote() {
    if (!soundEnabled) return;
    const note = melody[currentNote];
    playTone(note.note, note.dur / 1000 * 0.8, 'triangle', 0.08);
    currentNote = (currentNote + 1) % melody.length;
    bgmInterval = setTimeout(playNextNote, note.dur);
  }
  
  playNextNote();
}

function stopBGM() {
  if (bgmInterval) {
    clearTimeout(bgmInterval);
    bgmInterval = null;
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  btn.textContent = soundEnabled ? '🔊' : '🔇';
  
  if (soundEnabled) {
    if (!audioCtx) initAudio();
    startBGM();
    playClick();
  } else {
    stopBGM();
  }
}

const unlockedAchievements = new Set();

function unlockAchievement(id) {
  if (unlockedAchievements.has(id)) return;
  
  const achievement = achievements.find(a => a.id === id);
  if (!achievement) return;
  
  unlockedAchievements.add(id);
  gameState.achievements.push(id);
  
  playAchievement();
  
  const popup = document.getElementById('achievementPopup');
  popup.querySelector('.badge').textContent = achievement.icon;
  popup.querySelector('.name').textContent = '成就解锁：' + achievement.name;
  popup.querySelector('.desc').textContent = achievement.desc;
  popup.classList.add('show');
  
  setTimeout(() => {
    popup.classList.remove('show');
  }, 2500);
}

function checkAchievements() {
  // 检查各种成就条件
  if (gameState.day >= 2) unlockAchievement('survive_monday');
  
  if (gameState.hair <= 30) unlockAchievement('no_hair');
  if (gameState.mood <= 20) unlockAchievement('bad_mood');
  if (gameState.energy <= 10) unlockAchievement('low_energy');
  
  // 统计选项类型
  if (window.coffeeCount >= 3) unlockAchievement('coffee_addict');
  if (window.moyuCount >= 3) unlockAchievement('skip_work');
  if (window.workCount >= 5) unlockAchievement('hardworker');
}

  dayEvents.push(randomFrom(events.afternoon.filter(e => e !== dayEvents[dayEvents.length - 1])));
  
  // 随机特殊事件（30%概率）
  if (Math.random() < 0.3) {
    const idx = Math.floor(Math.random() * (dayEvents.length - 1)) + 1;
    dayEvents.splice(idx, 0, randomFrom(events.special));
  }
  
  // 晚上
  if (gameState.day < 5) {
    dayEvents.push(randomFrom(events.evening));
  } else {
    // 周五下午直接下班
    dayEvents.push({
      time: '下午 18:00',
      icon: '🎉',
      title: '周五下班！',
      desc: '终于到周五了！周末就在眼前。你收拾好东西，准备冲出门。',
      choices: [
        { text: '冲啊！周末我来了！', effects: { mood: +30, energy: +20 }, result: '你第一个冲出公司。自由的感觉真好！' },
        { text: '假装忙一会再走', effects: { mood: +10, energy: -5, hair: -3 }, result: '你象征性地多待了10分钟。走的时候感觉自己亏了。' }
      ]
    });
  }
  
  currentEventIndex = 0;
}

function randomFrom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function showEvent() {
  const event = dayEvents[currentEventIndex];
  currentEvent = event;
  
  document.getElementById('eventTime').textContent = event.time;
  document.getElementById('eventIllustration').textContent = event.icon;
  document.getElementById('eventTitle').textContent = event.title;
  document.getElementById('eventDesc').textContent = event.desc;
  
  const choicesContainer = document.getElementById('choices');
  choicesContainer.innerHTML = '';
  
  event.choices.forEach((choice, index) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${String.fromCharCode(65 + index)}.</span>${choice.text}`;
    btn.onclick = () => makeChoice(index);
    choicesContainer.appendChild(btn);
  });
  
  // 添加卡片动画
  const card = document.getElementById('eventCard');
  card.style.animation = 'none';
  card.offsetHeight; // 触发重排
  card.style.animation = 'slideIn 0.5s ease';
}

function makeChoice(index) {
  playClick();
  
  const choice = currentEvent.choices[index];
  
  // 统计选择类型（用于成就）
  const text = choice.text;
  if (text.includes('咖啡') || text.includes('美式')) {
    window.coffeeCount++;
  }
  if (text.includes('摸鱼') || text.includes('刷手机') || text.includes('假装') || text.includes('拖')) {
    window.moyuCount++;
  }
  if (text.includes('认真') || text.includes('努力') || text.includes('好好') || text.includes('马上改')) {
    window.workCount++;
  }
  
  // 应用效果
  let resultText = choice.result;
  let isPositive = true;
  
  // 显示结果弹窗
  const changes = [];
  if (choice.effects.energy) {
    gameState.energy = Math.max(0, Math.min(100, gameState.energy + choice.effects.energy));
    const change = choice.effects.energy;
    changes.push({
      label: '体力',
      value: (change > 0 ? '+' : '') + change,
      positive: change > 0
    });
    if (change < 0) isPositive = false;
  }
  if (choice.effects.mood) {
    gameState.mood = Math.max(0, Math.min(100, gameState.mood + choice.effects.mood));
    const change = choice.effects.mood;
    changes.push({
      label: '心情',
      value: (change > 0 ? '+' : '') + change,
      positive: change > 0
    });
    if (change < 0) isPositive = false;
  }
  if (choice.effects.hair) {
    gameState.hair = Math.max(0, Math.min(100, gameState.hair + choice.effects.hair));
    const change = choice.effects.hair;
    changes.push({
      label: '头发',
      value: (change > 0 ? '+' : '') + change,
      positive: change > 0
    });
    if (change < 0) isPositive = false;
  }
  
  // 播放音效
  if (isPositive) {
    playPositive();
  } else {
    playNegative();
  }
  
  updateStats();
  checkAchievements();
  
  // 检查游戏结束
  if (gameState.energy <= 0 || gameState.mood <= 0 || gameState.hair <= 0) {
    gameOver();
    return;
  }
  
  // 显示结果
  showResult(resultText, changes, isPositive);
}

function showResult(text, changes, isPositive) {
  const popup = document.getElementById('resultPopup');
  const overlay = document.getElementById('resultOverlay');
  
  document.getElementById('resultEmoji').textContent = isPositive ? '😊' : '😅';
  document.getElementById('resultTitle').textContent = isPositive ? '还行还行' : '有点惨';
  document.getElementById('resultDesc').textContent = text;
  
  const changesContainer = document.getElementById('statChanges');
  changesContainer.innerHTML = '';
  changes.forEach(c => {
    const div = document.createElement('div');
    div.className = 'stat-change ' + (c.positive ? 'positive' : 'negative');
    div.textContent = `${c.label} ${c.value}`;
    changesContainer.appendChild(div);
  });
  
  popup.classList.add('show');
  overlay.classList.add('show');
}

function nextEvent() {
  playClick();
  
  const popup = document.getElementById('resultPopup');
  const overlay = document.getElementById('resultOverlay');
  popup.classList.remove('show');
  overlay.classList.remove('show');
  
  currentEventIndex++;
  gameState.choicesCount++;
  
  // 自然消耗
  gameState.energy = Math.max(0, gameState.energy - 2);
  updateStats();
  
  if (currentEventIndex >= dayEvents.length) {
    // 当天结束
    endDay();
  } else {
    showEvent();
  }
}

function endDay() {
  // 这一天结束了
  if (gameState.day >= 5) {
    // 周五结束，游戏通关
    victory();
    return;
  }
  
  // 进入下一天
  gameState.day++;
  
  // 晚上休息恢复
  gameState.energy = Math.min(100, gameState.energy + 30);
  gameState.mood = Math.min(100, gameState.mood + 10);
  gameState.hair = Math.min(100, gameState.hair + 2);
  
  // 更新进度
  updateWeekProgress();
  
  // 生成新一天的事件
  generateDayEvents();
  
  // 显示新一天的开始
  showDayTransition();
}

function showDayTransition() {
  const dayNames = ['', '周一', '周二', '周三', '周四', '周五'];
  const dayName = dayNames[gameState.day];
  
  const popup = document.getElementById('resultPopup');
  const overlay = document.getElementById('resultOverlay');
  
  document.getElementById('resultEmoji').textContent = '🌅';
  document.getElementById('resultTitle').textContent = dayName + '到了';
  document.getElementById('resultDesc').textContent = '新的一天，新的搬砖。昨晚睡得还行吗？';
  
  const changesContainer = document.getElementById('statChanges');
  changesContainer.innerHTML = '';
  
  popup.classList.add('show');
  overlay.classList.add('show');
  
  // 按钮文本改成"开始"
  const btn = popup.querySelector('.result-btn');
  btn.textContent = '开始搬砖';
  
  // 临时修改按钮行为
  const originalNext = nextEvent;
  window.nextEvent = function() {
    popup.classList.remove('show');
    overlay.classList.remove('show');
    btn.textContent = '继续';
    window.nextEvent = originalNext;
    showEvent();
  };
}

function updateStats() {
  document.getElementById('energyBar').style.width = gameState.energy + '%';
  document.getElementById('energyValue').textContent = gameState.energy;
  
  document.getElementById('moodBar').style.width = gameState.mood + '%';
  document.getElementById('moodValue').textContent = gameState.mood;
  
  document.getElementById('hairBar').style.width = gameState.hair + '%';
  document.getElementById('hairValue').textContent = gameState.hair;
  
  // 低数值警告
  if (gameState.energy <= 20) {
    document.getElementById('energyBar').classList.add('low');
  } else {
    document.getElementById('energyBar').classList.remove('low');
  }
  
  if (gameState.mood <= 20) {
    document.getElementById('moodBar').classList.add('low');
  } else {
    document.getElementById('moodBar').classList.remove('low');
  }
  
  if (gameState.hair <= 30) {
    document.getElementById('hairBar').classList.add('low');
  } else {
    document.getElementById('hairBar').classList.remove('low');
  }
}

function updateWeekProgress() {
  const days = document.querySelectorAll('.week-day');
  days.forEach((day, i) => {
    const dayNum = i + 1;
    day.classList.remove('current', 'passed', 'dead');
    
    if (dayNum < gameState.day) {
      day.classList.add('passed');
    } else if (dayNum === gameState.day) {
      day.classList.add('current');
    }
  });
}

function gameOver() {
  gameState.gameOver = true;
  stopBGM();
  playGameOver();
  
  let reason = '';
  let emoji = '';
  
  if (gameState.energy <= 0) {
    reason = '你的体力耗尽了，直接在工位上晕了过去。同事帮你叫了救护车。';
    emoji = '😵';
  } else if (gameState.mood <= 0) {
    reason = '你的心情跌到了谷底。你打开招聘网站，开始投简历。';
    emoji = '😭';
  } else if (gameState.hair <= 0) {
    reason = '你的头发...它走了。你摸了摸光溜溜的头顶，决定去买顶帽子。';
    emoji = '👨‍🦲';
  }
  
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('endingScreen').classList.add('show');
  
  document.getElementById('endingEmoji').textContent = emoji;
  document.getElementById('endingTitle').textContent = '游戏结束';
  document.getElementById('endingDesc').textContent = reason;
  
  document.getElementById('endEnergy').textContent = gameState.energy;
  document.getElementById('endMood').textContent = gameState.mood;
  document.getElementById('endHair').textContent = gameState.hair;
  
  showAchievementsList();
}

function victory() {
  stopBGM();
  playVictory();
  
  // 检查周五结束时的成就
  if (gameState.hair >= 80) unlockAchievement('full_hair');
  unlockAchievement('survive_week');
  
  let rank = '';
  let emoji = '';
  let desc = '';
  
  const total = gameState.energy + gameState.mood + gameState.hair;
  
  if (total >= 240) {
    rank = '人生赢家';
    emoji = '🏆';
    desc = '你不仅活过了一周，还活得有滋有味。头发健在，心情愉快，体力充沛。你就是打工人的天花板！';
  } else if (total >= 180) {
    rank = '合格打工人';
    emoji = '👍';
    desc = '你成功熬完了这一周。虽然有点累，掉了点头发，但整体还能撑住。下周继续加油！';
  } else if (total >= 120) {
    rank = '勉强活着';
    emoji = '😅';
    desc = '你活下来了。虽然心情不怎么样，头发也少了一些，但至少...还活着？周末好好休息吧。';
  } else {
    rank = '濒临崩溃';
    emoji = '💀';
    desc = '这一周对你来说太难了。身心俱疲，头发也没剩多少。要不...考虑换个工作？';
  }
  
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('endingScreen').classList.add('show');
  
  document.getElementById('endingEmoji').textContent = emoji;
  document.getElementById('endingTitle').textContent = rank;
  document.getElementById('endingDesc').textContent = desc;
  
  document.getElementById('endEnergy').textContent = gameState.energy;
  document.getElementById('endMood').textContent = gameState.mood;
  document.getElementById('endHair').textContent = gameState.hair;
  
  showAchievementsList();
}

function showAchievementsList() {
  const container = document.getElementById('achievementList');
  
  if (unlockedAchievements.size === 0) {
    container.innerHTML = '<p style="text-align:center;color:var(--text-dim);font-size:12px;">暂无成就，继续加油~</p>';
    return;
  }
  
  let html = '<div class="achievement-title">🏆 获得成就</div>';
  unlockedAchievements.forEach(id => {
    const a = achievements.find(ach => ach.id === id);
    if (a) {
      html += `
        <div class="achievement-item">
          <div class="icon">${a.icon}</div>
          <div class="info">
            <div class="name">${a.name}</div>
            <div class="desc">${a.desc}</div>
          </div>
        </div>
      `;
    }
  });
  
  container.innerHTML = html;
}

function showAchievements() {
  playClick();
  // 简单显示一下
  showNotification(`已解锁 ${unlockedAchievements.size} / ${achievements.length} 个成就`);
}

function showNotification(text) {
  const notif = document.getElementById('notification');
  notif.textContent = text;
  notif.classList.add('show');
  
  setTimeout(() => {
    notif.classList.remove('show');
  }, 2000);
}

// ==================== 游戏控制 ====================
function startGame() {
  if (!audioCtx) {
    initAudio();
  }
  
  playClick();
  startBGM();
  
  // 重置状态
  gameState.day = 1;
  gameState.energy = 80;
  gameState.mood = 60;
  gameState.hair = 100;
  gameState.achievements = [];
  gameState.gameOver = false;
  gameState.choicesCount = 0;
  
  window.coffeeCount = 0;
  window.moyuCount = 0;
  window.workCount = 0;
  
  unlockedAchievements.clear();
  
  // 生成第一天事件
  generateDayEvents();
  
  // 切换界面
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('endingScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.add('show');
  
  updateStats();
  updateWeekProgress();
  showEvent();
}

function restartGame() {
  playClick();
  
  document.getElementById('endingScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.remove('show');
  document.getElementById('startScreen').style.display = 'flex';
  
  stopBGM();
}

function shareGame() {
  playClick();
  
  if (navigator.share) {
    navigator.share({
      title: '老板不在 - 职场生存模拟器',
      text: '我在《老板不在》里活过了' + gameState.day + '天，你能撑到周五吗？',
      url: window.location.href
    });
  } else {
    showNotification('点击右上角分享给朋友~');
  }
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  // 预加载音效（用户第一次点击后才会初始化音频）
  document.body.addEventListener('click', initAudio, { once: true });
  document.body.addEventListener('touchstart', initAudio, { once: true });
});
</script>
